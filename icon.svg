<svg viewBox="0 0 260 450" xmlns="http://www.w3.org/2000/svg" font-family="serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0828"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="gld" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#daa52088"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="260" height="450" rx="8" fill="url(#bg)"/>

  <!-- Outer border -->
  <rect x="6" y="6" width="248" height="438" rx="6" fill="none" stroke="#daa520" stroke-width="1.5" opacity="0.8"/>
  <rect x="10" y="10" width="240" height="430" rx="4" fill="none" stroke="#daa520" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner ornaments -->
  <g fill="#daa520" opacity="0.7">
    <polygon points="14,14 26,14 14,26" />
    <polygon points="246,14 234,14 246,26" />
    <polygon points="14,436 26,436 14,424" />
    <polygon points="246,436 234,436 246,424" />
    <circle cx="14" cy="14" r="2"/><circle cx="246" cy="14" r="2"/>
    <circle cx="14" cy="436" r="2"/><circle cx="246" cy="436" r="2"/>
  </g>

  <!-- Top band -->
  <rect x="10" y="10" width="240" height="36" rx="4" fill="#daa520" opacity="0.12"/>
  <line x1="10" y1="46" x2="250" y2="46" stroke="#daa520" stroke-width="0.8" opacity="0.5"/>

  <!-- Card number — vertically centred in top band (band: y10–y46 = 36px tall, centre=28) -->
  <text x="130" y="32.9" text-anchor="middle" dominant-baseline="middle" font-family="serif" font-size="14" fill="#daa520" letter-spacing="3" font-weight="bold">IV</text>

  <!-- Side decorations -->
  <line x1="22" y1="54" x2="22" y2="350" stroke="#daa520" stroke-width="0.5" opacity="0.3"/>
  <line x1="238" y1="54" x2="238" y2="350" stroke="#daa520" stroke-width="0.5" opacity="0.3"/>

  <!-- Central mandala/scene — centre y=205, bottom edge ~285, well above text zone y=358 -->
  <circle cx="130" cy="205" r="80" fill="#daa520" opacity="0.06"/>
  <circle cx="130" cy="205" r="65" fill="none" stroke="#daa520" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 4"/>
  <circle cx="130" cy="205" r="46" fill="#daa520" opacity="0.08"/>

  <!-- Suit-specific central artwork -->
  <g transform="translate(130,205)" filter="url(#glow)">
    <circle r="26" fill="#daa520" opacity="0.12"/>
         <path d="M0,-28 L6,-16 L20,-20 L12,-8 L26,0 L12,0 L16,14 L0,8 L-16,14 L-12,0 L-26,0 L-12,-8 L-20,-20 L-6,-16 Z" fill="#daa520" opacity="0.25" stroke="#daa520" stroke-width="1"/>
  </g>

  <!-- Arc decorations -->
  <g opacity="0.4">
    <path d="M 65 148 Q 130 100 195 148" fill="none" stroke="#daa520" stroke-width="0.8"/>
    <path d="M 65 265 Q 130 310 195 265" fill="none" stroke="#daa520" stroke-width="0.8"/>
  </g>
  <!-- Fixed structure, no dynamic y arithmetic that can cause overlap:
       358: separator line
       358–370: keyword row  (always 12px tall slot)
       370–376: dot ornaments row (always 6px slot)
       376–376+nameH: Chinese name  (nameH = max(fs.name,12))
       after name + 4px gap: English  (always fits, clipped if needed)
       440: bottom frame line
  -->
  
  <line x1="14" y1="358" x2="246" y2="358" stroke="#daa520" stroke-width="0.7" opacity="0.4"/>
  <text x="130" y="368" text-anchor="middle" font-family="serif"
        font-size="9" fill="#daa520" opacity="0.42" letter-spacing="1">權威・秩序</text>
  <g fill="#daa520" opacity="0.32">
    <circle cx="105" cy="373" r="1.2"/><circle cx="118" cy="373" r="1.2"/><circle cx="130" cy="373" r="1.2"/><circle cx="142" cy="373" r="1.2"/><circle cx="155" cy="373" r="1.2"/>
  </g>
  <text x="130" y="396" text-anchor="middle" font-family="serif"
        font-size="18" fill="#daa520" letter-spacing="2" font-weight="bold">皇帝</text>
  <text x="130" y="407" text-anchor="middle" font-family="serif"
        font-size="8" fill="#daa520" opacity="0.52" letter-spacing="0.5">The Emperor</text>
  <line x1="14" y1="443" x2="246" y2="443" stroke="#daa520" stroke-width="0.6" opacity="0.3"/>

  <!-- Top ornament dots row -->
  <g fill="#daa520" opacity="0.4">
    <circle cx="90" cy="55" r="1.5"/><circle cx="110" cy="55" r="1.5"/><circle cx="130" cy="55" r="1.5"/><circle cx="150" cy="55" r="1.5"/><circle cx="170" cy="55" r="1.5"/>
  </g>
</svg>