<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0535"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#e8e0f8" stop-opacity="0.95"/>
      <stop offset="25%"  stop-color="#b090e0" stop-opacity="0.85"/>
      <stop offset="60%"  stop-color="#4a1f7a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d0520" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="mistGrad" cx="45%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.4"/>
      <stop offset="45%"  stop-color="#7040c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a0535" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hilightGrad" cx="30%" cy="25%" r="40%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="60%"  stop-color="#e0d8ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="30%"  stop-color="#c9a84c" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#c9a84c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starFilter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="ballClip">
      <circle cx="256" cy="225" r="148"/>
    </clipPath>
  </defs>

  <!-- 圓角背景 -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- 背景裝飾星點 -->
  <g opacity="0.45">
    <circle cx="60"  cy="55"  r="1.5" fill="#c9a84c"/>
    <circle cx="448" cy="80"  r="1.2" fill="#fff"/>
    <circle cx="80"  cy="420" r="1.0" fill="#c9a84c"/>
    <circle cx="460" cy="400" r="1.5" fill="#fff"/>
    <circle cx="30"  cy="250" r="1.0" fill="#a080d0"/>
    <circle cx="480" cy="240" r="1.2" fill="#a080d0"/>
    <circle cx="200" cy="35"  r="1.0" fill="#fff"/>
  </g>

  <!-- 外光暈 -->
  <circle cx="256" cy="225" r="168" fill="#8840c0" fill-opacity="0.12" filter="url(#glowFilter)"/>

  <!-- 水晶球主體 -->
  <circle cx="256" cy="225" r="148" fill="url(#ballGrad)"/>

  <!-- 霧氣層 -->
  <g clip-path="url(#ballClip)">
    <ellipse cx="256" cy="235" rx="120" ry="80" fill="url(#mistGrad)" opacity="0.8"/>
    <ellipse cx="210" cy="265" rx="90"  ry="60" fill="#6040b0" fill-opacity="0.15"/>
    <ellipse cx="300" cy="190" rx="75"  ry="50" fill="#c9a84c" fill-opacity="0.08"/>
  </g>

  <!-- 球體邊緣 -->
  <circle cx="256" cy="225" r="148" fill="none" stroke="rgba(74,31,122,0.5)" stroke-width="6"/>
  <circle cx="256" cy="225" r="142" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="2"/>

  <!-- 內部星點 -->
  <g filter="url(#starFilter)" clip-path="url(#ballClip)">
    <circle cx="225" cy="195" r="3.0" fill="#fff"    opacity="0.9"/>
    <circle cx="292" cy="210" r="2.5" fill="#c9a84c" opacity="0.85"/>
    <circle cx="208" cy="252" r="2.8" fill="#fff"    opacity="0.7"/>
    <circle cx="300" cy="255" r="2.2" fill="#a0c8ff" opacity="0.9"/>
    <circle cx="254" cy="175" r="2.5" fill="#fff"    opacity="0.65"/>
    <circle cx="318" cy="235" r="2.0" fill="#c9a84c" opacity="0.75"/>
    <circle cx="188" cy="225" r="2.2" fill="#fff"    opacity="0.55"/>
    <circle cx="278" cy="162" r="2.0" fill="#c8c8d8" opacity="0.8"/>
  </g>

  <!-- 主高光 -->
  <ellipse cx="208" cy="163" rx="52" ry="38" fill="url(#hilightGrad)"/>
  <circle  cx="190" cy="150" r="14"  fill="#fff" fill-opacity="0.45"/>

  <!-- 底座柱 -->
  <rect x="228" y="371" width="56" height="26" rx="4" fill="url(#baseGrad)" opacity="0.9"/>

  <!-- 底座台 -->
  <ellipse cx="256" cy="410" rx="88" ry="18" fill="url(#baseGrad)"/>
  <ellipse cx="256" cy="406" rx="55" ry="5"  fill="rgba(201,168,76,0.35)"/>

  <!-- ARCANA 文字 -->
  <text x="256" y="462"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="bold" letter-spacing="8"
        text-anchor="middle"
        fill="#c9a84c" fill-opacity="0.88">ARCANA</text>

  <!-- 頂部 ✦ -->
  <text x="256" y="60"
        font-family="serif" font-size="26"
        text-anchor="middle"
        fill="#c9a84c" fill-opacity="0.55">✦</text>
</svg>
